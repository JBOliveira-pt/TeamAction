# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [20.x, 22.x]
                # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

        env:
            # Clerk Public Variables (required at build time)
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXRlcm5hbC11cmNoaW4tNjMuY2xlcmsuYWNjb3VudHMuZGV2JA
            NEXT_PUBLIC_CLERK_SIGN_IN_URL: /login
            NEXT_PUBLIC_CLERK_SIGN_UP_URL: /signup
            NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
            NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /onboarding

            # R2 Public URL
            NEXT_PUBLIC_R2_IMAGES_URL: https://pub-5de44bde848c4dbcabd75025afe46c7e.r2.dev/teamaction-images

            # Secrets (add these to GitHub Secrets: Settings -> Secrets and variables -> Actions)
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
            CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
            AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
            R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
            R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
            R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

        steps:
            - uses: actions/checkout@v4
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
            - run: npm ci
            - run: npm run build --if-present
            - run: npm test
